<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>节气用香 · 顺时养息</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f2ebe5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
        }
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 36px;
            box-shadow: 0 20px 40px -10px rgba(80, 60, 40, 0.2);
            padding: 32px 28px;
            border: 1px solid #ece1d6;
        }
        h1 {
            font-size: 2rem;
            font-weight: 450;
            color: #2f4b3c;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
            border-bottom: 2px solid #dccfbf;
            padding-bottom: 16px;
        }
        h1::before {
            content: "🍃";
            font-size: 2.2rem;
        }
        .current-term {
            background: #e6daca;
            border-radius: 100px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            color: #2e3b2b;
            font-weight: 500;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .current-label {
            background: #3e5d4a;
            color: #f9f1e7;
            border-radius: 40px;
            padding: 6px 18px;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }
        .term-name-big {
            font-size: 2rem;
            font-weight: 500;
            line-height: 1.2;
            margin-bottom: 12px;
            color: #274131;
        }
        .scent-name {
            font-size: 1.8rem;
            font-weight: 350;
            color: #6b4f38;
            margin-bottom: 20px;
            border-left: 5px solid #b38e6b;
            padding-left: 18px;
        }
        .ingredients {
            background: #fcf6f0;
            border-radius: 28px;
            padding: 20px 24px;
            margin: 24px 0;
            border: 1px solid #decbb8;
        }
        .ingredients h3 {
            font-weight: 500;
            color: #4a6b57;
            margin-bottom: 14px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .ingredients h3::before {
            content: "🌾";
            font-size: 1.5rem;
        }
        .ingredient-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 18px;
            list-style: none;
        }
        .ingredient-list li {
            background: white;
            padding: 8px 20px;
            border-radius: 40px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            border: 1px solid #ecd9c6;
            color: #4f3e2c;
        }
        .effect {
            background: #dde9df;
            border-radius: 24px;
            padding: 16px 22px;
            color: #1e3b2c;
            margin: 20px 0 28px;
            font-style: italic;
            border-left: 8px solid #718e6f;
            line-height: 1.6;
        }
        .selector-area {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 24px;
        }
        .selector-area label {
            font-weight: 600;
            color: #4e6b5a;
        }
        select {
            flex: 1;
            min-width: 240px;
            padding: 14px 20px;
            border-radius: 60px;
            border: 1px solid #c9b6a2;
            background: white;
            font-size: 1rem;
            color: #2c3e30;
            cursor: pointer;
            outline: none;
            transition: 0.2s;
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%236b4f38" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat;
            background-position: right 20px center;
            background-size: 16px;
        }
        select:hover, select:focus {
            border-color: #a58362;
            box-shadow: 0 0 0 3px rgba(165, 131, 98, 0.15);
        }
        .reset-today {
            background: #f3e5d8;
            border: none;
            padding: 14px 24px;
            border-radius: 60px;
            font-weight: 600;
            color: #4a5d48;
            cursor: pointer;
            transition: 0.15s;
            white-space: nowrap;
            border: 1px solid transparent;
        }
        .reset-today:hover {
            background: #e2d0bd;
            border-color: #bcaa93;
        }
        footer {
            margin-top: 16px;
            text-align: center;
            color: #94806b;
            font-size: 0.85rem;
        }
    </style>
</head>
